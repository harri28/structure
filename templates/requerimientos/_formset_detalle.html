{{ formset.management_form }}

<div style="overflow-x:auto">
<table class="table table-sm align-middle mb-0" id="tabla-detalle">
  <thead class="table-light">
    <tr>
      <th style="width:3rem;text-align:center">Ítem</th>
      <th style="min-width:220px">Descripción</th>
      <th style="width:130px">Cantidad</th>
      <th style="width:80px">Unidad</th>
      <th style="width:90px">Stock</th>
      <th style="width:110px">Cant. Requerida</th>
      <th style="min-width:180px">Justificación</th>
      <th style="width:2rem"></th>
    </tr>
  </thead>
  <tbody id="formset-container">
    {% for form in formset %}
    <tr class="formset-row {% if form.instance.pk %}existing-row{% endif %}" data-index="{{ forloop.counter0 }}">
      <td class="text-center fw-semibold text-muted item-num" style="font-size:.78rem">
        {% if form.instance.insumo_id %}{{ form.instance.insumo.codigo }}{% else %}—{% endif %}
      </td>
      <td>
        <div class="prod-wrap" style="position:relative">
          <input type="text" class="form-control form-control-sm prod-search"
                 placeholder="Buscar material..."
                 autocomplete="off"
                 value="{% if form.instance.insumo_id %}{{ form.instance.insumo.descripcion }}{% elif form.instance.descripcion %}{{ form.instance.descripcion }}{% endif %}">
          {{ form.insumo }}
          {{ form.descripcion }}
          <div class="prod-dropdown" style="display:none;position:fixed;z-index:9999;
               background:#fff;border:1px solid #dee2e6;border-radius:4px;
               max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.12)"></div>
        </div>
      </td>
      <td>
        <input type="number" step="0.0001" name="{{ form.cantidad.html_name }}"
               value="{{ form.cantidad.value|default:'0' }}"
               class="form-control form-control-sm cantidad-pres"
               readonly style="background:#f8f9fa;color:#6b7280">
      </td>
      <td>
        <input type="text" name="{{ form.unidad.html_name }}"
               value="{{ form.unidad.value|default:'' }}"
               class="form-control form-control-sm insumo-unidad" placeholder="und"
               readonly style="background:#f8f9fa;color:#6b7280">
      </td>
      <td>
        <input type="text" class="form-control form-control-sm stock-display"
               value="{% if form.instance.insumo_id %}—{% else %}—{% endif %}"
               readonly style="background:#f8f9fa;color:#6c757d;text-align:right"
               data-insumo-id="{{ form.instance.insumo_id|default:'' }}">
      </td>
      <td>
        <input type="number" step="0.0001" name="{{ form.cantidad_requerida.html_name }}"
               value="{{ form.cantidad_requerida.value|default:'' }}"
               class="form-control form-control-sm cant-req">
        <div class="cant-req-error" style="display:none;font-size:.72rem;color:#dc2626;margin-top:2px"></div>
      </td>
      <td>
        <input type="text" name="{{ form.justificacion.html_name }}"
               value="{{ form.justificacion.value|default:'' }}"
               class="form-control form-control-sm" placeholder="Motivo del pedido">
      </td>
      <td class="text-center">
        <label class="btn-tbl danger d-inline-flex align-items-center justify-content-center"
               style="cursor:pointer;padding:.3rem .45rem" title="Quitar ítem">
          <i class="bi bi-trash"></i>
          <input type="checkbox" name="{{ form.DELETE.html_name }}" class="d-none">
        </label>
        {{ form.id }}
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
</div>

<div id="sugerencia-banner" style="display:none;margin-top:.75rem;padding:.6rem 1rem;
     border-radius:6px;font-size:.82rem;display:none;align-items:center;gap:.75rem;
     background:#eff6ff;border:1px solid #bfdbfe">
  <i class="bi bi-info-circle-fill" style="color:#2563eb;font-size:1rem;flex-shrink:0"></i>
  <span id="sugerencia-texto" style="flex:1"></span>
  <a id="sugerencia-link" href="#" class="btn btn-sm btn-primary py-0 px-2" style="font-size:.78rem;white-space:nowrap"></a>
  <button type="button" onclick="document.getElementById('sugerencia-banner').style.display='none'"
          style="background:none;border:none;color:#6b7280;cursor:pointer;padding:0;font-size:1rem;line-height:1">&times;</button>
</div>

<button type="button" class="btn-add-row mt-2 w-100" id="add-row">
  <i class="bi bi-plus-lg me-1"></i>Agregar ítem
</button>

<script>
(function() {
  const API_PROD  = '/almacen/api/productos/';
  const API_STOCK = '/almacen/api/insumo/';
  let activeDropdown = null;

  const PROYECTO_ID = '{{ proyecto.pk }}';
  const HM_UNITS = ['hm', 'h/m'];
  const HH_UNITS = ['hh', 'h/h'];

  function mostrarSugerencia(tipo, desc) {
    const banner = document.getElementById('sugerencia-banner');
    const texto  = document.getElementById('sugerencia-texto');
    const link   = document.getElementById('sugerencia-link');
    if (tipo === 'hm') {
      texto.textContent = 'Este insumo usa Horas Máquina. ¿Deseas registrar horas de maquinaria para "' + desc + '"?';
      link.textContent  = 'Ir a Maquinaria →';
      link.href = '/maquinaria/proyecto/' + PROYECTO_ID + '/maquinaria/nuevo/';
    } else {
      texto.textContent = 'Este insumo usa Horas Hombre. ¿Deseas registrar horas de cuadrilla para "' + desc + '"?';
      link.textContent  = 'Ir a Cuadrilla →';
      link.href = '/maquinaria/proyecto/' + PROYECTO_ID + '/registros/nuevo/';
    }
    banner.style.display = 'flex';
  }

  function detectarUnidadEspecial(unidad, desc) {
    const u = unidad.toLowerCase().trim();
    if (HM_UNITS.includes(u)) mostrarSugerencia('hm', desc);
    else if (HH_UNITS.includes(u)) mostrarSugerencia('hh', desc);
    else document.getElementById('sugerencia-banner').style.display = 'none';
  }

  function actualizarItems() {
    // No renumera — el código lo asigna el insumo seleccionado
  }

  function cargarStock(insumoId, stockInput) {
    if (!insumoId) { stockInput.value = '—'; return; }
    fetch(API_STOCK + insumoId + '/stock/')
      .then(r => r.json())
      .then(data => { stockInput.value = parseFloat(data.stock).toFixed(2); })
      .catch(() => { stockInput.value = '—'; });
  }

  function buscar(input, q) {
    if (q === undefined) q = input.value.trim();
    const wrap = input.closest('.prod-wrap');
    const dropdown = wrap.querySelector('.prod-dropdown');
    const rect = input.getBoundingClientRect();
    dropdown.style.top  = rect.bottom + 'px';
    dropdown.style.left = rect.left + 'px';
    dropdown.style.width = rect.width + 'px';
    fetch(API_PROD + (q ? '?q=' + encodeURIComponent(q) : ''))
      .then(r => r.json())
      .then(data => {
        if (!data.length) {
          dropdown.innerHTML = '<div style="padding:8px 12px;color:#9ca3af;font-size:.8rem">Sin resultados</div>';
        } else {
          dropdown.innerHTML = data.map(p =>
            `<div class="prod-opt" data-id="${p.id}" data-unidad="${p.unidad}"
                  data-codigo="${p.codigo}"
                  data-desc="${p.descripcion.replace(/"/g,'&quot;')}"
                  data-cantidad="${p.cantidad}"
                  data-label="${p.descripcion.replace(/"/g,'&quot;')}"
                  style="padding:6px 12px;cursor:pointer;border-bottom:1px solid #f3f4f6;font-size:.8rem">
               <strong style="color:var(--amber-dark)">${p.codigo}</strong>
               <span style="color:#374151"> ${p.descripcion}</span>
             </div>`
          ).join('');
        }
        dropdown.style.display = 'block';
        activeDropdown = dropdown;
      })
      .catch(() => {});
  }

  document.addEventListener('click', function(e) {
    const opt = e.target.closest('.prod-opt');
    if (opt) {
      const wrap   = opt.closest('.prod-wrap');
      const row    = wrap.closest('.formset-row');
      wrap.querySelector('.prod-search').value = opt.dataset.label;
      const insumoInput = wrap.querySelector('input[name$="-insumo"]');
      if (insumoInput) insumoInput.value = opt.dataset.id;
      const descInput = wrap.querySelector('input[name$="-descripcion"]');
      if (descInput) descInput.value = opt.dataset.desc;
      const undInp = row ? row.querySelector('.insumo-unidad') : null;
      if (undInp) undInp.value = opt.dataset.unidad;
      detectarUnidadEspecial(opt.dataset.unidad || '', opt.dataset.desc || opt.dataset.label || '');
      const cantPres = row ? row.querySelector('.cantidad-pres') : null;
      if (cantPres) cantPres.value = opt.dataset.cantidad;
      const stockInp = row ? row.querySelector('.stock-display') : null;
      if (stockInp) cargarStock(opt.dataset.id, stockInp);
      const itemNum = row ? row.querySelector('.item-num') : null;
      if (itemNum) itemNum.textContent = opt.dataset.codigo;
      opt.closest('.prod-dropdown').style.display = 'none';
      return;
    }
    if (activeDropdown && !e.target.classList.contains('prod-search')) {
      activeDropdown.style.display = 'none';
      activeDropdown = null;
    }
  });

  // Mostrar lista al enfocar el input
  document.addEventListener('focus', function(e) {
    if (!e.target.classList.contains('prod-search')) return;
    buscar(e.target, e.target.value.trim());
  }, true);

  let timer;
  document.addEventListener('input', function(e) {
    if (!e.target.classList.contains('prod-search')) return;
    clearTimeout(timer);
    const q = e.target.value.trim();
    if (!q) {
      const wrap = e.target.closest('.prod-wrap');
      const dropdown = wrap?.querySelector('.prod-dropdown');
      if (dropdown) dropdown.style.display = 'none';
      return;
    }
    timer = setTimeout(() => buscar(e.target, q), 280);
  });

  document.addEventListener('change', function(e) {
    if (e.target.classList.contains('prod-search') && !e.target.value.trim()) {
      const wrap = e.target.closest('.prod-wrap');
      const row  = wrap.closest('.formset-row');
      const insumoInput = wrap.querySelector('input[name$="-insumo"]');
      if (insumoInput) insumoInput.value = '';
      const descInput = wrap.querySelector('input[name$="-descripcion"]');
      if (descInput) descInput.value = '';
      const cantPresClr = row ? row.querySelector('.cantidad-pres') : null;
      if (cantPresClr) cantPresClr.value = '';
      const stockInp = row ? row.querySelector('.stock-display') : null;
      if (stockInp) stockInp.value = '—';
      const itemNum = row ? row.querySelector('.item-num') : null;
      if (itemNum) itemNum.textContent = '—';
    }
  });

  // Validar que cant. requerida no supere la cantidad presupuestada
  function validarCantReq(input) {
    const row = input.closest('.formset-row');
    const cantPres = row ? row.querySelector('.cantidad-pres') : null;
    const errDiv   = input.closest('td')?.querySelector('.cant-req-error');
    const max      = cantPres ? parseFloat(cantPres.value) : NaN;
    const val      = parseFloat(input.value);
    if (!errDiv) return true;
    if (!isNaN(max) && max > 0 && !isNaN(val) && val > max) {
      input.classList.add('is-invalid');
      errDiv.textContent = 'No puede superar lo presupuestado (' + max.toLocaleString('es-PE', {maximumFractionDigits: 4}) + ')';
      errDiv.style.display = 'block';
      return false;
    }
    input.classList.remove('is-invalid');
    errDiv.style.display = 'none';
    return true;
  }

  document.addEventListener('input', function(e) {
    if (e.target.classList.contains('cant-req')) validarCantReq(e.target);
  });

  // Bloquear envío si alguna fila tiene cant. requerida inválida; marcar filas vacías como DELETE
  document.querySelector('form')?.addEventListener('submit', function(ev) {
    // Marcar filas sin insumo ni descripción como DELETE para que Django las ignore
    document.querySelectorAll('.formset-row').forEach(function(row) {
      const insumoInput = row.querySelector('input[name$="-insumo"]');
      const descInput   = row.querySelector('input[name$="-descripcion"]');
      const searchInput = row.querySelector('.prod-search');
      const isEmpty = (!insumoInput || !insumoInput.value.trim()) &&
                      (!descInput   || !descInput.value.trim()) &&
                      (!searchInput || !searchInput.value.trim());
      if (isEmpty) {
        const del = row.querySelector('input[type=checkbox][name$="-DELETE"]');
        if (del) del.checked = true;
      }
    });
    let ok = true;
    document.querySelectorAll('.cant-req').forEach(function(inp) {
      if (!validarCantReq(inp)) ok = false;
    });
    if (!ok) {
      ev.preventDefault();
      ev.stopImmediatePropagation();
    }
  });

  // DELETE checkbox — tachar fila y actualizar numeración
  document.getElementById('formset-container').addEventListener('change', function(e) {
    if (e.target.type === 'checkbox' && e.target.name?.endsWith('-DELETE')) {
      const row = e.target.closest('.formset-row');
      if (row) row.style.display = e.target.checked ? 'none' : '';
      actualizarItems();
    }
  });

  // Agregar fila
  document.getElementById('add-row').addEventListener('click', function() {
    const tbody  = document.getElementById('formset-container');
    const rows   = tbody.querySelectorAll('.formset-row');
    const idx    = rows.length;
    const prefix = document.querySelector('[name$="-TOTAL_FORMS"]')?.name.replace('-TOTAL_FORMS','') || 'detalles';
    const tpl    = rows[0].cloneNode(true);
    tpl.innerHTML = tpl.innerHTML.replace(new RegExp(prefix + '-\\d+-', 'g'), `${prefix}-${idx}-`);
    tpl.querySelectorAll('input:not([type=hidden]):not([type=checkbox])').forEach(i => {
      if (!i.classList.contains('stock-display')) i.value = '';
    });
    tpl.querySelectorAll('input[type=checkbox]').forEach(i => i.checked = false);
    tpl.querySelectorAll('input[type=hidden][name$="-id"]').forEach(i => i.value = '');
    tpl.querySelectorAll('input[type=hidden][name$="-insumo"]').forEach(i => i.value = '');
    tpl.querySelectorAll('input[type=hidden][name$="-descripcion"]').forEach(i => i.value = '');
    tpl.querySelectorAll('.prod-dropdown').forEach(d => d.style.display = 'none');
    tpl.querySelector('.prod-search').value = '';
    tpl.querySelector('.stock-display').value = '—';
    tpl.style.opacity = '1';
    tbody.appendChild(tpl);
    const tf = document.querySelector('[name$="-TOTAL_FORMS"]');
    if (tf) tf.value = idx + 1;
    actualizarItems();
    tpl.querySelector('.prod-search')?.focus();
  });

  // Cargar stock para filas existentes con insumo
  document.querySelectorAll('.stock-display[data-insumo-id]').forEach(function(inp) {
    if (inp.dataset.insumoId) cargarStock(inp.dataset.insumoId, inp);
  });

  actualizarItems();
})();
</script>
