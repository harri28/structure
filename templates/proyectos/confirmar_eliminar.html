{% extends 'base.html' %}
{% block title %}Eliminar Proyecto{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white">Confirmar Eliminación</div>
      <div class="card-body text-center py-4">
        <i class="bi bi-exclamation-triangle-fill fs-1 text-danger mb-3 d-block"></i>
        <h5>¿Eliminar el proyecto "{{ proyecto.nombre }}"?</h5>
        <p class="text-muted">Esta acción eliminará todos los presupuestos, movimientos y datos asociados.</p>
        <form method="post" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger me-2">Sí, eliminar</button>
          <a href="{% url 'proyectos:lista' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
